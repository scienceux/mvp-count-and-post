camera:
  source: "usb"         # "usb", "csi", or path to video file
  device_index: 0
  width: 640
  height: 480
  fps: 5

detection:
  model_name: "yolov8n.pt"
  model_path: "models/yolov8n_ncnn_model"
  confidence: 0.5
  input_size: 640       # 320 for pi4, re-run export_model.py if you change this

counter:
  line_position: 0.5    # 0.0 = top, 1.0 = bottom
  tracker: "bytetrack.yaml"

logging:
  csv_dir: "logs"
  device_id: "booth-v3"

display:
  show: true           # true only if monitor is plugged in

upload:
  url: "https://script.google.com/macros/s/AKfycbxievFNu5o6SfLJm4da9DU8ci3qPRs9zRLqpAAVbiCkEpDq82b6GQKW-QwOY3Z-Erg/exec"  # Google Apps Script URL; leave empty to disable uploading
  event_id: "booth-v3"  # eventId param sent to the sheet
  interval_seconds: 30  # how often to attempt flush
